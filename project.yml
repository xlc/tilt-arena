name: TiltArena

options:
  bundleIdPrefix: com.xlc
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1"

packages:
  SwiftLog:
    url: https://github.com/apple/swift-log
    from: "1.6.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.19.2"

targets:
  TiltArena:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: TiltArena
    dependencies:
      - package: SwiftLog
        product: Logging
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJWFL4CNW
        PRODUCT_BUNDLE_IDENTIFIER: com.xlc.TiltArena
        INFOPLIST_FILE: TiltArena/Resources/Info.plist
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        TARGETED_DEVICE_FAMILY: "1"

  TiltArenaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: TiltArenaTests
    dependencies:
      - target: TiltArena
      - package: SwiftLog
        product: Logging
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJWFL4CNW
        PRODUCT_BUNDLE_IDENTIFIER: com.xlc.TiltArenaTests
        GENERATE_INFOPLIST_FILE: true

schemes:
  TiltArena:
    build:
      targets:
        TiltArena: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TiltArenaTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
